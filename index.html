<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Interpretations and Recommendations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pink-bg: #f3add0;
    --pink-panel: #f9c8de;
    --cream: #fff2f8;
    --ink: #16215c;
    --ink-bright: #3247d1;
    --line: #d67aa8;
    --line-soft: #e6a9c6;
    --err: #a3123a;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--pink-bg);
    background-image:
      radial-gradient(circle at 12% 8%, rgba(255,255,255,0.35), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(255,255,255,0.25), transparent 45%);
    color: var(--ink);
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
    display:flex;
    justify-content:center;
    padding: 48px 18px 80px;
  }

  .sleeve{ width:100%; max-width: 620px; }

  .stamp{
    width: 128px; height: 128px; border-radius:50%;
    border: 3px solid var(--ink); background: var(--cream);
    margin: 0 auto 22px; display:flex; align-items:center; justify-content:center;
    text-align:center; transform: rotate(-6deg);
    box-shadow: 0 6px 0 -2px rgba(22,33,92,0.15); padding: 10px;
    background-size: cover; background-position: center; overflow: hidden;
  }
  .stamp.has-art{ padding: 0; }
  .stamp.has-art span{ display:none; }
  .stamp span{
    font-family:'Space Mono', monospace; font-size: 9px;
    letter-spacing: 0.1em; text-transform: uppercase; line-height:1.55;
    word-break: break-word;
  }

  header{ text-align:center; margin-bottom: 22px; }
  h1{
    font-family:'Instrument Serif', serif; font-style: italic; font-weight: 400;
    font-size: 44px; line-height:1.05; margin: 0; color: var(--ink);
  }

  /* ---- Cue box ---- */
  .cue{
    background: var(--pink-panel);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 16px;
    margin: 30px 0;
  }
  .cue-row{ display:flex; gap:10px; }
  .cue input{
    flex:1;
    font-family:'Work Sans', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    border-radius: 8px;
    border: 2px solid var(--ink);
    background: var(--cream);
    color: var(--ink);
    outline: none;
  }
  .cue input::placeholder{ color: #8a7590; }
  .cue button{
    font-family:'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--pink-panel);
    border: none;
    border-radius: 8px;
    padding: 0 18px;
    cursor: pointer;
  }
  .cue button:hover{ background: var(--ink-bright); }
  .cue button:disabled{ opacity: 0.6; cursor: default; }
  .cue-status{
    font-family:'Space Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    margin: 10px 2px 0;
  }
  .cue-status.error{ color: var(--err); }

  /* ---- Now playing ---- */
  .now-playing{ text-align:center; margin-bottom: 8px; }
  .now-playing .eyebrow{
    font-family:'Space Mono', monospace;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-bright); margin: 0 0 4px;
  }
  .now-playing .title{
    font-family:'Instrument Serif', serif; font-style: italic; font-size: 30px; margin: 0;
  }
  .now-playing .artist{
    font-family:'Work Sans', sans-serif; font-size: 15px; font-weight: 500; margin: 2px 0 0;
  }
  .now-playing .album{
    font-family:'Space Mono', monospace; font-size: 12px; color: var(--ink);
    opacity: 0.65; margin: 4px 0 0; letter-spacing: 0.02em;
  }

  /* ---- Card / liner notes ---- */
  .liner{
    background: var(--cream); border: 2px solid var(--ink); border-radius: 18px;
    padding: 8px 30px 26px; margin-top: 26px;
  }
  .track{ padding: 22px 0; border-bottom: 1px dashed var(--line); }
  .track:last-child{ border-bottom: none; }
  .track-head{ display:flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
  .track-num{
    font-family:'Space Mono', monospace; font-size: 13px; font-weight:700;
    color: var(--ink-bright); min-width: 26px;
  }
  .track-title{ font-family:'Instrument Serif', serif; font-style: italic; font-size: 23px; margin:0; }
  .track p{ margin: 0; font-size: 15.5px; line-height: 1.62; padding-left: 38px; }

  /* ---- B-side recs ---- */
  .bside{
    margin-top: 30px; background: var(--pink-panel); border: 2px solid var(--ink);
    border-radius: 18px; padding: 24px 26px 8px;
  }
  .bside-head{
    font-family:'Space Mono', monospace; font-size: 12px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink); margin: 0 0 14px;
  }
  .rec{ display:flex; gap: 12px; padding: 14px 0; border-bottom: 1px dashed var(--line-soft); }
  .rec:last-child{ border-bottom: none; }
  .rec-num{
    font-family:'Space Mono', monospace; font-size: 13px; color: var(--ink-bright);
    font-weight:700; min-width: 20px;
  }
  .rec-body b{ font-family:'Work Sans', sans-serif; font-weight:600; }
  .rec-body p{ margin: 4px 0 0; font-size: 14.5px; line-height:1.55; }

  /* ---- Loading / error states ---- */
  .state-box{
    text-align:center;
    padding: 40px 20px;
    font-family:'Space Mono', monospace;
    font-size: 13px;
    color: var(--ink);
  }
  .state-box.error{ color: var(--err); }

  footer{
    text-align:center; margin-top: 34px; font-family:'Space Mono', monospace;
    font-size: 11px; color: var(--ink); opacity: 0.7; letter-spacing: 0.04em;
  }

  @media (max-width: 480px){
    h1{ font-size: 34px; }
    .liner{ padding: 8px 18px 20px; }
    .track p{ padding-left: 0; margin-top: 4px; }
    .track-head{ flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="sleeve">

  <div class="stamp" id="stampBox"><span id="stampText">Cue<br>Up<br>A<br>Song</span></div>

  <header>
    <h1>Song Interpretations<br>and Recommendations</h1>
  </header>

  <div class="cue">
    <div class="cue-row">
      <input type="text" id="cueInput" placeholder="Song — Artist" onkeydown="if(event.key==='Enter')analyzeSong()">
      <button id="cueBtn" onclick="analyzeSong()">Cue Up</button>
    </div>
    <p class="cue-status" id="cueStatus"></p>
  </div>

  <div id="results">
    <div class="state-box">Cue up a song above to get started.</div>
  </div>

</div>

<script>
// Point this at your deployed Cloudflare Worker URL.
const WORKER_URL = "https://songlens.scottachs-cloudfare.workers.dev";

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Applies the album art the Worker already looked up server-side.
// Falls back to the text stamp if none was found.
function setStampArt(artworkUrl){
  const stampBox = document.getElementById('stampBox');
  stampBox.classList.remove('has-art');
  stampBox.style.backgroundImage = '';

  if (!artworkUrl) return;
  stampBox.style.backgroundImage = `url("${artworkUrl}")`;
  stampBox.classList.add('has-art');
}

async function analyzeSong(){
  const query = document.getElementById('cueInput').value.trim();
  const statusEl = document.getElementById('cueStatus');
  const btn = document.getElementById('cueBtn');

  statusEl.className = 'cue-status';
  statusEl.textContent = '';

  if (!query){
    statusEl.className = 'cue-status error';
    statusEl.textContent = 'Type a song title (and artist, if you can).';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Spinning...';
  document.getElementById('stampBox').classList.remove('has-art');
  document.getElementById('stampBox').style.backgroundImage = '';
  document.getElementById('stampText').innerHTML = 'Cue<br>Up<br>A<br>Song';
  document.getElementById('results').innerHTML = '<div class="state-box">Dropping the needle — researching and writing this one up...</div>';

  const attempt = async () => {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    const data = await res.json();
    return { res, data };
  };

  try{
    let res, data;
    try {
      ({ res, data } = await attempt());
    } catch (firstErr) {
      // Transient network hiccups happen with slower searches — retry once, silently.
      document.getElementById('results').innerHTML = '<div class="state-box">Still working on it — trying once more...</div>';
      ({ res, data } = await attempt());
    }

    if (!res.ok || data.error){
      let msg = data.error || ('Something went wrong (' + res.status + ').');
      if (data.debug){
        msg += '<br><br><span style="opacity:0.7">DEBUG (' + (data.stop_reason || 'no stop_reason') + '): ' + escapeHtml(data.debug) + '</span>';
      }
      document.getElementById('results').innerHTML =
        '<div class="state-box error">' + msg + '</div>';
      return;
    }

    renderResult(data);
    const anchor = document.getElementById('nowPlayingAnchor');
    if (anchor) anchor.scrollIntoView({ behavior: 'smooth' });

  } catch(e){
    document.getElementById('results').innerHTML =
      '<div class="state-box error">Could not reach the analysis tool. Try again in a moment.</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Cue Up';
  }
}

function renderResult(d){
  const stampLines = [d.song, d.artist, d.album].filter(Boolean);
  document.getElementById('stampText').innerHTML = stampLines.map(escapeHtml).join('<br>');
  setStampArt(d.artwork_url);

  const meta = [d.album, d.year].filter(Boolean).join(' · ');
  const recs = (d.recommendations || []).map((r, i) => `
    <div class="rec">
      <span class="rec-num">${i+1}</span>
      <div class="rec-body">
        <b>${escapeHtml(r.title)} — ${escapeHtml(r.artist)}</b>
        <p>${escapeHtml(r.reason)}</p>
      </div>
    </div>
  `).join('');

  document.getElementById('results').innerHTML = `
    <div class="now-playing" id="nowPlayingAnchor">
      <p class="eyebrow">Now Playing</p>
      <h2 class="title">${escapeHtml(d.song)}</h2>
      <p class="artist">${escapeHtml(d.artist)}</p>
      ${meta ? `<p class="album">${escapeHtml(meta)}</p>` : ''}
    </div>

    <div class="liner">
      <div class="track">
        <div class="track-head"><span class="track-num">01</span><h3 class="track-title">The Setup</h3></div>
        <p>${escapeHtml(d.setup)}</p>
      </div>
      <div class="track">
        <div class="track-head"><span class="track-num">02</span><h3 class="track-title">The Characters</h3></div>
        <p>${escapeHtml(d.characters)}</p>
      </div>
      <div class="track">
        <div class="track-head"><span class="track-num">03</span><h3 class="track-title">The Moral/Ethical Tension</h3></div>
        <p>${escapeHtml(d.moral_tension)}</p>
      </div>
      <div class="track">
        <div class="track-head"><span class="track-num">04</span><h3 class="track-title">The Psychology</h3></div>
        <p>${escapeHtml(d.psychology)}</p>
      </div>
      <div class="track">
        <div class="track-head"><span class="track-num">05</span><h3 class="track-title">Why It Hits</h3></div>
        <p>${escapeHtml(d.why_it_hits)}</p>
      </div>
    </div>

    <div class="bside">
      <p class="bside-head">B-Side — Recommended Next Spins</p>
      ${recs}
    </div>
  `;
}
</script>

</body>
</html>
